name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            compiler: clang
            cc: clang-17
            cxx: clang++-17
          - os: macos-latest
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y gcc-13 g++-13
          else
            sudo apt-get install -y clang-17
          fi

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake ninja
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            brew install gcc@13
          fi

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -G Ninja

      - name: Build
        run: cmake --build build

      - name: Verify all binaries
        run: |
          echo "=== Verifying 23 design pattern demos ==="
          for binary in singleton factory_method abstract_factory builder prototype adapter bridge composite decorator facade flyweight proxy chain_of_responsibility command interpreter iterator mediator memento observer state strategy template_method visitor; do
            if [ -f "build/$binary" ]; then
              echo "✓ $binary"
            else
              echo "✗ $binary MISSING"
              exit 1
            fi
          done
          echo "=== All 23 demos compiled successfully ==="
