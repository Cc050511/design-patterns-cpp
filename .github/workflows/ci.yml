name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-arch:
    name: Build (Arch Linux - ${{ matrix.compiler }})
    runs-on: ubuntu-latest
    container: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel cmake ninja gcc clang clang-tidy

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -G Ninja -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run all tests
        run: cd build && ctest --output-on-failure
        continue-on-error: true

      - name: Verify all binaries exist
        run: |
          echo "=== Verifying 23 design pattern demos ==="
          for binary in singleton factory_method abstract_factory builder prototype adapter bridge composite decorator facade flyweight proxy chain_of_responsibility command interpreter iterator mediator memento observer state strategy template_method visitor; do
            if [ -f "build/$binary" ]; then
              echo "✓ $binary"
            else
              echo "✗ $binary MISSING"
              exit 1
            fi
          done
          echo "=== All 23 demos compiled successfully ==="

      - name: Run static structure verification
        run: |
          echo "=== Static structure verification ==="
          bash scripts/verify_structure.sh src
        continue-on-error: true

      - name: Run runtime output verification
        run: |
          echo "=== Runtime output verification ==="
          bash scripts/verify_runtime.sh build
        continue-on-error: true

      - name: Run evaluation engine
        run: |
          echo "=== Running Pattern Evaluation Engine ==="
          python3 scripts/evaluate.py build src
        continue-on-error: true

  build-macos:
    name: Build (macOS - ${{ matrix.compiler }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja clang-tidy
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            brew install gcc@13
          fi

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -G Ninja -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run all tests
        run: cd build && ctest --output-on-failure
        continue-on-error: true

      - name: Verify all binaries exist
        run: |
          echo "=== Verifying 23 design pattern demos ==="
          for binary in singleton factory_method abstract_factory builder prototype adapter bridge composite decorator facade flyweight proxy chain_of_responsibility command interpreter iterator mediator memento observer state strategy template_method visitor; do
            if [ -f "build/$binary" ]; then
              echo "✓ $binary"
            else
              echo "✗ $binary MISSING"
              exit 1
            fi
          done
          echo "=== All 23 demos compiled successfully ==="

      - name: Run static structure verification
        run: |
          echo "=== Static structure verification ==="
          bash scripts/verify_structure.sh src

      - name: Run runtime output verification
        run: |
          echo "=== Runtime output verification ==="
          bash scripts/verify_runtime.sh build
        continue-on-error: true

      - name: Build and run tests
        run: |
          echo "=== Building Catch2 tests ==="
          cmake -B build-tests -G Ninja -DBUILD_TESTS=ON
          cmake --build build-tests
          cd build-tests
          ctest --output-on-failure
        continue-on-error: true
